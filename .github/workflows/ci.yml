name: MLflow CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install mlflow pandas scikit-learn matplotlib

      - name: Run MLflow Project
        run: |
          cd MLProject
          mlflow run . --env-manager=local

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          cd MLProject
          mlflow models build-docker -m saved_model -n adesuryadi/heart-disease-model:latest
          docker push adesuryadi/heart-disease-model:latest

      - name: Upload Artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: mlruns-artifacts
          path: MLProject/mlruns/
